name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-universal:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Build aarch64
        run: cargo build --release -p devsignal-daemon --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release -p devsignal-daemon --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/devsignal \
            target/x86_64-apple-darwin/release/devsignal \
            -output devsignal
          chmod +x devsignal

      - name: Package tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar czvf "devsignal-${VERSION}-macos-universal.tar.gz" devsignal

      - name: Upload GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            devsignal-*-macos-universal.tar.gz
            packaging/macos/com.devsignal.daemon.example.plist
